# SonarQube project configuration for frontend
sonar.projectKey=panaderia-frontend
sonar.projectName=Panaderia Frontend
sonar.projectVersion=1.0

# Paths
sonar.sources=src
sonar.tests=cypress
sonar.test.inclusions=cypress/e2e/**/*.cy.js

# Sonar server connection (added to send reports to the provided project)
# NOTE: storing tokens in repo is a security risk; consider using CI secrets instead.
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}

# Coverage and test report paths (JUnit from Cypress)
sonar.junit.reportPaths=reports/junit

# Encoding
sonar.sourceEncoding=UTF-8
